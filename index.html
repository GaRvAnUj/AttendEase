<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AttendEase — Smart Attendance Management System powered by AWS. Real-time tracking, automated sessions, and instant attendance reports." />
    <meta name="theme-color" content="#0a0e1a" />
    <title>AttendEase — Smart Attendance Management</title>
    <script>
      (function() {
        try {
          var pendingRoute = sessionStorage.getItem('spa-redirect-path');
          if (pendingRoute) {
            sessionStorage.removeItem('spa-redirect-path');
            window.history.replaceState(null, '', pendingRoute);
          }

          var theme = localStorage.getItem('theme') || 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
